name: deploy-cloud-run

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to use for deploy secrets and variables
        required: true
        default: staging
        type: environment
      image_tag:
        description: Image tag to publish
        required: false
        default: ""
        type: string
      deploy_target:
        description: Which part to deploy
        required: true
        default: full
        type: choice
        options:
          - backend
          - frontend
          - full

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_IMAGE_FRONTEND: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/inventory-manager-frontend
  GAR_IMAGE_BACKEND: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/inventory-manager-backend
  DEPLOY_TARGET: ${{ inputs.deploy_target || 'full' }}
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify backend
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'full' }}
        working-directory: backend
        run: |
          go mod tidy
          go test ./...
          go build ./cmd/server

      - name: Verify frontend
        if: ${{ env.DEPLOY_TARGET == 'frontend' || env.DEPLOY_TARGET == 'full' }}
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build backend image
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'full' }}
        run: docker build -t "$GAR_IMAGE_BACKEND:${IMAGE_TAG}" ./backend

      - name: Push backend image
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'full' }}
        run: docker push "$GAR_IMAGE_BACKEND:${IMAGE_TAG}"

      - name: Deploy migration job
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'full' }}
        run: |
          JOB_ARGS=(
            run
            jobs
            deploy
            "${{ vars.CLOUD_RUN_MIGRATION_JOB }}"
          )
          JOB_ARGS+=(
            --image "$GAR_IMAGE_BACKEND:${IMAGE_TAG}"
            --region "${{ vars.GCP_REGION }}"
            --service-account "${{ secrets.MIGRATE_RUNTIME_SERVICE_ACCOUNT }}"
            --set-secrets "DATABASE_URL=${{ vars.DATABASE_URL_SECRET_NAME }}:latest"
            --set-env-vars "APP_ENV=cloud,APP_MODE=cloud"
            --command /app/migrate
            --args up
          )
          if [[ -n "${{ vars.CLOUD_SQL_INSTANCE }}" ]]; then
            JOB_ARGS+=(--set-cloudsql-instances "${{ vars.CLOUD_SQL_INSTANCE }}")
          fi
          gcloud "${JOB_ARGS[@]}"
          gcloud run jobs execute "${{ vars.CLOUD_RUN_MIGRATION_JOB }}" \
            --region "${{ vars.GCP_REGION }}" \
            --wait

      - name: Deploy backend
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'full' }}
        run: |
          BACKEND_ENV_VARS="APP_ENV=cloud,APP_MODE=cloud,AUTH_MODE=${{ vars.AUTH_MODE }},RBAC_MODE=${{ vars.RBAC_MODE }},STORAGE_MODE=${{ vars.STORAGE_MODE }},JWT_VERIFIER=${{ vars.JWT_VERIFIER }},OIDC_EXPECTED_ISSUER=https://securetoken.google.com/${{ vars.GCP_PROJECT_ID }},OIDC_EXPECTED_AUDIENCE=${{ vars.GCP_PROJECT_ID }},OIDC_JWKS_URL=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com,JWT_SIGNING_ALGORITHMS=${{ vars.JWT_SIGNING_ALGORITHMS }},OIDC_REQUIRE_EMAIL_VERIFIED=${{ vars.OIDC_REQUIRE_EMAIL_VERIFIED }}"
          if [[ -n "${{ vars.CLOUD_STORAGE_BUCKET }}" ]]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},CLOUD_STORAGE_BUCKET=${{ vars.CLOUD_STORAGE_BUCKET }}"
          fi
          if [[ -n "${{ vars.GOOGLE_CLOUD_PROJECT }}" ]]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},GOOGLE_CLOUD_PROJECT=${{ vars.GOOGLE_CLOUD_PROJECT }}"
          fi
          if [[ -n "${{ vars.VERTEX_AI_LOCATION }}" ]]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},VERTEX_AI_LOCATION=${{ vars.VERTEX_AI_LOCATION }}"
          fi
          if [[ -n "${{ vars.GEMINI_MODEL }}" ]]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},GEMINI_MODEL=${{ vars.GEMINI_MODEL }}"
          fi
          FRONTEND_ORIGIN="${{ vars.FRONTEND_PUBLIC_URL }}"
          if [[ -z "${FRONTEND_ORIGIN}" ]]; then
            FRONTEND_ORIGIN="$(gcloud run services describe "${{ vars.CLOUD_RUN_FRONTEND_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)' 2>/dev/null || true)"
          fi
          if [[ -n "${FRONTEND_ORIGIN}" ]]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},ALLOWED_ORIGINS=${FRONTEND_ORIGIN}"
          fi
          BACKEND_ARGS=(
            run deploy "${{ vars.CLOUD_RUN_BACKEND_SERVICE }}"
            --image "$GAR_IMAGE_BACKEND:${IMAGE_TAG}"
            --region "${{ vars.GCP_REGION }}"
            --platform managed
            --service-account "${{ secrets.BACKEND_RUNTIME_SERVICE_ACCOUNT }}"
            --allow-unauthenticated
            --set-env-vars "$BACKEND_ENV_VARS"
            --set-secrets DATABASE_URL=${{ vars.DATABASE_URL_SECRET_NAME }}:latest,PROCUREMENT_WEBHOOK_SECRET=PROCUREMENT_WEBHOOK_SECRET:latest
          )
          if [[ -n "${{ vars.CLOUD_SQL_INSTANCE }}" ]]; then
            BACKEND_ARGS+=(--set-cloudsql-instances "${{ vars.CLOUD_SQL_INSTANCE }}")
          fi
          gcloud "${BACKEND_ARGS[@]}"

      - name: Resolve backend URL
        id: backend_url
        if: ${{ env.DEPLOY_TARGET == 'backend' || env.DEPLOY_TARGET == 'frontend' || env.DEPLOY_TARGET == 'full' }}
        run: |
          echo "url=$(gcloud run services describe "${{ vars.CLOUD_RUN_BACKEND_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        if: ${{ env.DEPLOY_TARGET == 'frontend' || env.DEPLOY_TARGET == 'full' }}
        run: |
          docker build -t "$GAR_IMAGE_FRONTEND:${IMAGE_TAG}" ./frontend
          docker push "$GAR_IMAGE_FRONTEND:${IMAGE_TAG}"
          gcloud run deploy "${{ vars.CLOUD_RUN_FRONTEND_SERVICE }}" \
            --image "$GAR_IMAGE_FRONTEND:${IMAGE_TAG}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --service-account "${{ secrets.FRONTEND_RUNTIME_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --set-env-vars API_BASE_URL=${{ steps.backend_url.outputs.url }},FIREBASE_API_KEY=${{ vars.FIREBASE_API_KEY }},FIREBASE_AUTH_DOMAIN=${{ vars.FIREBASE_AUTH_DOMAIN }},FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},FIREBASE_APP_ID=${{ vars.FIREBASE_APP_ID }}

      - name: Resolve frontend URL
        id: frontend_url
        if: ${{ env.DEPLOY_TARGET == 'frontend' || env.DEPLOY_TARGET == 'full' }}
        run: |
          echo "url=$(gcloud run services describe "${{ vars.CLOUD_RUN_FRONTEND_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')" >> "$GITHUB_OUTPUT"

      - name: Update backend public URLs
        if: ${{ env.DEPLOY_TARGET == 'full' || (env.DEPLOY_TARGET == 'frontend' && steps.frontend_url.outputs.url != '') }}
        run: |
          gcloud run services update "${{ vars.CLOUD_RUN_BACKEND_SERVICE }}" \
            --region "${{ vars.GCP_REGION }}" \
            --update-env-vars "APP_BASE_URL=${{ steps.backend_url.outputs.url }},ALLOWED_ORIGINS=${{ steps.frontend_url.outputs.url }}"

      - name: Verify deployed health
        if: ${{ env.DEPLOY_TARGET == 'full' || env.DEPLOY_TARGET == 'frontend' || env.DEPLOY_TARGET == 'backend' }}
        run: |
          BACKEND_URL="${{ steps.backend_url.outputs.url }}"
          if [[ -z "${BACKEND_URL}" ]]; then
            BACKEND_URL="$(gcloud run services describe "${{ vars.CLOUD_RUN_BACKEND_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')"
          fi
          echo "Backend URL: ${BACKEND_URL}"
          curl --fail --silent --show-error "${BACKEND_URL}/health" >/dev/null
          curl --fail --silent --show-error "${BACKEND_URL}/ready" >/dev/null
          if [[ "${DEPLOY_TARGET}" == "frontend" || "${DEPLOY_TARGET}" == "full" ]]; then
            FRONTEND_URL="${{ steps.frontend_url.outputs.url }}"
            if [[ -z "${FRONTEND_URL}" ]]; then
              FRONTEND_URL="$(gcloud run services describe "${{ vars.CLOUD_RUN_FRONTEND_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')"
            fi
            echo "Frontend URL: ${FRONTEND_URL}"
            curl --fail --silent --show-error "${FRONTEND_URL}" >/dev/null
          fi
